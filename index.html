<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zadanie kreator usług</title>
</head>
<body>
  <div class="grupa">
  <div class="pytanie" id="DivPytanie1">
  <p class="pytanko">Czy firma posiada już stronę internetową?</p>
  <form id="pytanie1">
    <div class="guzik">
    <button type="button" value="Tak" class="guzik1">Tak</button>
    <button type="button" value="Nie" class="guzik1">Nie</button>
    </div>
  </form>
  </div>
  <div class="pytanie" id="DivPytanie2">
  <p class="pytanko">Co jest głównym celem działań? </p>
  <form id="pytanie2">
    <div class="guzik">
    <button type="button" value="Sprzedaz" class="guzik2">Sprzedaż produktów</button>
    <button type="button" value="Pozyskiwanie" class="guzik2">Pozyskiwanie usług</button>
    <button type="button" value="Budowa" class="guzik2">Budowa marki</button>
    </div>
  </form>
  </div>
  <div class="pytanie" id="DivPytanie3">
  <p class="pytanko">Jaki jest zasięg działalności?</p>
  <form id="pytanie3">
    <div class="guzik">
    <button type="button" value="Lokalnie" class="guzik3">Lokalnie</button>
    <button type="button" value="Ogolnopolski" class="guzik3">Ogólnopolski</button>
    </div>
  </form>  
  </div>
  <div class="pytanie" id="DivWynik">
  <p class="pytanko">Rekomendacja:</p>
  <p id="Pwynik"></p>
  <form id="wynik">
    <div class="guzik">
    <button type="button" class="guzikRestart">Spróbuj ponownie</button>
    </div>
  </form>
  </div>
  </div>
</body>
</html>
